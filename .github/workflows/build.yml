name: Build and Notarize macOS App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    
    # Only run notarization if the secrets are available (e.g. not on forks)
    env:
      HAS_APPLE_SECRETS: ${{ secrets.MAC_CERTS_P12_BASE64 != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Install Build Tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Apple Certificate
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_CERTS_P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          # Decode the p12 certificate from base64 secret
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # Apply partition list to prevent UI permission prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build Universal App (arm64 + x86_64)
        run: |
          xcodebuild -project CCSwitcher.xcodeproj \
            -scheme CCSwitcher \
            -configuration Release \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            SYMROOT=$(PWD)/build

      - name: Sign App
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        run: |
          # Sign nested extensions first (inside-out), then the main app.
          # All bundles need --options runtime for notarization.

          # 1. Sign the widget extension with its own entitlements
          codesign --force --options runtime --sign "Developer ID Application" --timestamp \
            --entitlements CCSwitcherWidget/Resources/CCSwitcherWidget.entitlements \
            build/Release/CCSwitcher.app/Contents/Extensions/CCSwitcherWidgetExtension.appex

          # 2. Sign the main app bundle
          codesign --force --options runtime --sign "Developer ID Application" --timestamp \
            --entitlements CCSwitcher/Resources/CCSwitcher.entitlements \
            build/Release/CCSwitcher.app

      - name: Create DMG
        run: |
          cd build/Release
          # Create DMG
          create-dmg \
            --volname "CCSwitcher" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CCSwitcher.app" 150 190 \
            --hide-extension "CCSwitcher.app" \
            --app-drop-link 450 190 \
            "CCSwitcher.dmg" \
            "CCSwitcher.app"

      - name: Sign DMG
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        run: |
          cd build/Release
          codesign --force --sign "Developer ID Application" --timestamp CCSwitcher.dmg

      - name: Notarize DMG
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          cd build/Release
          xcrun notarytool submit CCSwitcher.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Staple Ticket to DMG
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        run: |
          cd build/Release
          xcrun stapler staple CCSwitcher.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSwitcher-macOS
          path: build/Release/CCSwitcher.dmg

      - name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/CCSwitcher.dmg"

          cat > build/Release/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "",
                "url": "$DOWNLOAD_URL"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "$DOWNLOAD_URL"
              }
            }
          }
          EOF

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            build/Release/CCSwitcher.dmg
            build/Release/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Homebrew Tap Update
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          repository: XueshiQiao/homebrew_tap
          event-type: update_cask
          client-payload: '{"app_token": "ccswitcher"}'
